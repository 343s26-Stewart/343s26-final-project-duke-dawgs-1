<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockTag — Groups</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app-layout">
    <aside class="sidebar">
      <span class="logo" aria-hidden="true">BlockTag</span>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="feed.html">Feed</a>
        <a class="nav-link" href="discover.html">Discover</a>
        <a class="nav-link active" href="groups.html">Groups</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
    </aside>

    <main id="main-content" class="main-content">
      <section class="page-card">
        <header>
          <h1>Groups</h1>
        </header>

        <section aria-label="Create a group">
          <h2>Create Group</h2>
          <form id="group-form" class="form-stack">
            <label for="group-name">Group Name</label>
            <input id="group-name" type="text" class="form-input" required placeholder="e.g. SMP Builders">

            <label for="group-your-name">Your Name</label>
            <input id="group-your-name" type="text" class="form-input" required placeholder="Minecraft username">

            <p id="group-form-msg" class="form-msg" role="alert"></p>
            <button type="submit" class="btn-primary">Create</button>
          </form>
        </section>

        <section aria-label="Your groups">
          <h2>All Groups</h2>
          <div id="groups-list" role="list" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </div>

  <footer class="app-footer">
    <p>&copy; 2026 BlockTag &mdash; Duke Dawgs. Built for CS 343.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/groups.js"></script>
</body>
</html>
