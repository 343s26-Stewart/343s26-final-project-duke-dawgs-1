<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockTag — Feed</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app-layout">
    <aside class="sidebar">
      <span class="logo" aria-hidden="true">BlockTag</span>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="feed.html">Feed</a>
        <a class="nav-link" href="discover.html">Discover</a>
        <a class="nav-link" href="groups.html">Groups</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="settings.html">Settings</a>
      </nav>
    </aside>

    <main id="main-content" class="main-content">
      <section class="page-card">
        <header>
          <h1>Feed</h1>
        </header>

        <section aria-label="Create a post">
          <h2>New Post</h2>
          <form id="post-form" class="form-stack">
            <label for="post-author">Your name</label>
            <input id="post-author" type="text" class="form-input" required placeholder="Minecraft username">

            <label for="post-desc">Description</label>
            <textarea id="post-desc" class="form-input" rows="3" required placeholder="What are you playing?"></textarea>

            <fieldset class="tag-fieldset">
              <legend>Tags</legend>
              <div class="tag-checks" id="post-tags">
                <label><input type="checkbox" name="tag" value="Builder"> Builder</label>
                <label><input type="checkbox" name="tag" value="Casual"> Casual</label>
                <label><input type="checkbox" name="tag" value="PvP"> PvP</label>
                <label><input type="checkbox" name="tag" value="Modded"> Modded</label>
                <label><input type="checkbox" name="tag" value="Survival"> Survival</label>
                <label><input type="checkbox" name="tag" value="Creative"> Creative</label>
                <label><input type="checkbox" name="tag" value="Minigames"> Minigames</label>
                <label><input type="checkbox" name="tag" value="Hardcore"> Hardcore</label>
              </div>
            </fieldset>

            <p id="post-form-msg" class="form-msg" role="alert"></p>
            <button type="submit" class="btn-primary">Post</button>
          </form>
        </section>

        <section aria-label="Post feed">
          <h2>Recent Posts</h2>
          <div class="sort-row">
            <label for="sort-select">Sort by:</label>
            <select id="sort-select" class="form-input form-select">
              <option value="recent">Most Recent</option>
              <option value="interested">Most Interest</option>
            </select>
          </div>
          <div id="feed-list" role="list" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </div>

  <footer class="app-footer">
    <p>&copy; 2026 BlockTag &mdash; Duke Dawgs. Built for CS 343.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/applyDarkMode.js"></script>
</body>
</html>
